services:
  - type: web
    name: researchhub-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./researchhub.db
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHONPATH
        value: .
