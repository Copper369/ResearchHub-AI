services:
  - type: web
    name: researchhub-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./researchhub.db
      - key: ALLOWED_ORIGINS
        sync: false
